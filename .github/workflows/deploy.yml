name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, sqlite3, intl, bcmath, mbstring, gd, zip, pcntl
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare test env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test

  deploy:
    needs: test
    # Deploy only on push to main / manual run — never from a pull request.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (server builds & restarts)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/az
            git pull --ff-only origin main
            # Read-only results API key: keep .env in sync with the RESULTS_API_KEY
            # GitHub Actions secret (added once; value masked in the log; optimize
            # below re-caches config so the key takes effect).
            grep -q '^RESULTS_API_KEY=' .env || printf '\nRESULTS_API_KEY=%s\n' "${{ secrets.RESULTS_API_KEY }}" >> .env
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml run --rm app php artisan migrate --force
            # Rebuild the rubricator tree from the catalog (deterministic, idempotent,
            # titles need no LLM). Required by the broker mechanism.
            docker compose -f docker-compose.prod.yml run --rm app php artisan data:build-rubricator
            # Load/refresh the HS legal cards from database/data/hs_cards.json
            # (idempotent upsert by code). Re-runs each deploy, so updating the JSON
            # + pushing refreshes the card data without a schema change.
            docker compose -f docker-compose.prod.yml run --rm app php artisan db:seed --class='Database\Seeders\HsCardsSeeder' --force
            # Merge the cards' colloquial product synonyms into catalog.synonyms
            # (precise 6-digit mapping, idempotent). Lexical retrieval benefits
            # immediately; the vector leg after the next embedding refresh.
            docker compose -f docker-compose.prod.yml run --rm app php artisan catalog:sync-card-synonyms
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T app php artisan optimize
            # Horizon 5 self-serves its dashboard assets; the worker container is
            # recreated by `up -d` (SIGTERM + 30s grace) so Horizon restarts with
            # the new code — no horizon:terminate / horizon:publish needed.
            docker image prune -f
