# Production vhost for the Laravel app (php-fpm runs in the same container).
# Installed to /etc/nginx/conf.d/default.conf; the default Debian site is removed.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Allow real invoice/catalog uploads (PHP caps the actual file at 25M).
    client_max_body_size 50M;

    # Upload resilience: tolerate brief network stalls on slow/distant uplinks
    # so a hiccup mid-upload doesn't kill the request with a silent 408. These
    # are "time between reads", not total caps — a healthy upload is unaffected.
    client_body_timeout 300s;
    client_header_timeout 300s;
    send_timeout 300s;

    # Send nginx logs to the container stdout/stderr (docker compose logs).
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Long-cache the hashed Vite build assets.
    location /build/ {
        access_log off;
        expires max;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120s;
    }

    # Deny dotfiles, but keep ACME challenge reachable for future HTTPS.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
