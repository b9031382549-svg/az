; php-fpm pool tuning (merged onto the image's default [www] pool).
; Sized for a 4 vCPU / 7.6 GB box shared with Postgres + Ollama:
; ~8 workers x ~40-60 MB leaves headroom for the DB and embedding runs.
[www]
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
; Recycle workers periodically to bound any per-request memory growth.
pm.max_requests = 500

; Surface PHP-FPM worker logs in the container output.
catch_workers_output = yes
decorate_workers_output = no
