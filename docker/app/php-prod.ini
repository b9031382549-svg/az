; Production PHP overrides (loaded last from conf.d as zz-prod.ini).

; --- Uploads: mirror dev uploads.ini so prod accepts the same files ---
upload_max_filesize = 25M
post_max_size = 30M
memory_limit = 512M
max_execution_time = 120

; --- Hardening ---
expose_php = Off

; --- OPcache (production) ---
opcache.enable = 1
opcache.enable_cli = 0
; Code is immutable inside the image, so never revalidate timestamps. This is
; the single biggest prod win. (Never set this in dev — edits would be ignored.)
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
; Laravel + vendor easily exceed 10k files.
opcache.max_accelerated_files = 20000
opcache.max_wasted_percentage = 10
; REQUIRED: Laravel/attribute-driven packages read doc-comments.
opcache.save_comments = 1
opcache.fast_shutdown = 1
